<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #f1f5f9;
  color: #1e293b;
}

/* ===== LOGIN STYLES ===== */
.login-wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
  position: relative;
  overflow: hidden;
}

.login-wrapper::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: 
    linear-gradient(30deg, rgba(139,0,0,0.08) 12%, transparent 12.5%, transparent 87%, rgba(139,0,0,0.08) 87.5%),
    linear-gradient(150deg, rgba(139,0,0,0.08) 12%, transparent 12.5%, transparent 87%, rgba(139,0,0,0.08) 87.5%);
  background-size: 40px 70px;
  animation: moveHoney 20s linear infinite;
  opacity: 0.5;
}

@keyframes moveHoney {
  from { transform: translateY(0); }
  to { transform: translateY(-70px); }
}

.login-card {
  position: relative;
  width: 380px;
  padding: 40px 32px;
  border-radius: 24px;
  background: rgba(255,255,255,0.98);
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  z-index: 1;
  animation: fadeUp 0.6s ease;
}

.login-card h2 {
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #8B0000, #b91c1c);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-align: center;
  margin-bottom: 32px;
}

.input-group {
  position: relative;
  margin-bottom: 24px;
}

.input-group input {
  width: 100%;
  padding: 14px 45px 14px 16px;
  border: 2px solid #e2e8f0;
  outline: none;
  border-radius: 14px;
  background: white;
  font-size: 14px;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.input-group input:focus {
  border-color: #8B0000;
  box-shadow: 0 0 0 3px rgba(139,0,0,0.1);
}

.input-group label {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: white;
  padding: 0 4px;
  color: #94a3b8;
  font-size: 14px;
  pointer-events: none;
  transition: all 0.2s;
}

.input-group input:focus + label,
.input-group input:valid + label {
  top: 0;
  font-size: 11px;
  color: #8B0000;
}

.toggle-password {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #94a3b8;
  transition: 0.2s;
}

.toggle-password:hover {
  color: #8B0000;
}

.login-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: #8B0000;
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.login-btn:hover {
  background: #b91c1c;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(139,0,0,0.3);
}

.error-msg {
  margin-top: 16px;
  color: #dc2626;
  font-size: 13px;
  text-align: center;
}

.success-screen {
  display: none;
  text-align: center;
  animation: fadeUp 0.5s ease;
}

.success-screen h1 {
  font-size: 2rem;
  color: #8B0000;
  margin-bottom: 10px;
}

/* ===== MAIN APP LAYOUT ===== */
.app {
  display: flex;
  height: 100vh;
  flex-direction: column;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: #0f172a;
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  position: fixed;
  height: 100vh;
  left: 0;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 32px;
  display: flex;
  gap: 10px;
  align-items: center;
  color: white;
  padding: 0 12px;
}

.logo i {
  color: #8B0000;
  font-size: 1.5rem;
}

.nav-item {
  padding: 12px 16px;
  border-radius: 12px;

.nav-item i {

.nav-item:hover {

.nav-item.active {

.logout-item {

  gap: 12px;

}

.logout-item:hover {
  background: #8B0000;
  color: white;
}

/* ===== MAIN CONTENT ===== */
.main {
  flex: 1;
  margin-left: 260px;
  padding: 24px 32px;
  overflow: auto;
  background: #f8fafc;
  min-height: 100vh;

/* ===== BOTTOM NAVIGATION BAR ===== */
.bottom-nav {

  bottom: 0;

  right: 0;

  justify-content: space-around;
  align-items: center;
  padding: 12px 20px;

}

.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  color: #94a3b8;
  background: transparent;
  border: none;
  font-family: 'Inter', sans-serif;
}

.bottom-nav-item i {
  font-size: 1.3rem;
  transition: all 0.2s;
}

.bottom-nav-item span {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.bottom-nav-item:hover {
  background: rgba(139, 0, 0, 0.08);
  color: #8B0000;
  transform: translateY(-3px);
}

.bottom-nav-item.active {
  color: #8B0000;
  background: rgba(139, 0, 0, 0.12);
}

.bottom-nav-item.active i {
  transform: scale(1.1);
}

/* ===== TOPBAR ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}

.topbar h2 {
  font-size: 1.6rem;
  font-weight: 700;
  color: #0f172a;
}

.top-actions {
  display: flex;
  gap: 12px;
}

.search-bar {
  background: white;
  padding: 10px 16px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid #e2e8f0;
  transition: all 0.2s;
}

.search-bar:focus-within {
  border-color: #8B0000;

}

.search-bar input {
  border: none;

  width: 220px;
  font-size: 0.9rem;
  background: transparent;
}

.refresh-btn {
  background: #8B0000;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
}

.refresh-btn:hover {
  background: #b91c1c;
  transform: scale(1.02);
}

/* ===== FILTERS ===== */
.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 18px;
  border: none;
  background: white;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
  font-size: 0.85rem;
  color: #475569;
  border: 1px solid #e2e8f0;
}

.filter-btn:hover {
  background: #f1f5f9;
  border-color: #8B0000;
}

.filter-btn.active {
  background: #8B0000;
  color: white;
  border-color: #8B0000;
}

.date-picker-input {
  padding: 8px 16px;
  border: 1px solid #e2e8f0;
  border-radius: 40px;
  font-family: 'Inter', sans-serif;
  background: white;
  cursor: pointer;
}

/* ===== STATS GRID ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 28px;
}

.stat-card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.25s;
  border: 1px solid #eef2f7;
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.08);
}

.stat-info h4 {
  font-size: 0.8rem;
  color: #64748b;
  margin-bottom: 8px;
  font-weight: 500;
}

.stat-number {
  font-size: 1.8rem;
  font-weight: 700;
  color: #0f172a;
}

.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: 16px;
  background: #fff1f2;
  display: flex;
  align-items: center;
  justify-content: center;
}

.stat-icon i {
  color: #8B0000;
  font-size: 1.3rem;
}

/* ===== TABLE ===== */
.table-wrapper {
  overflow-x: auto;
  background: white;
  border-radius: 20px;
  border: 1px solid #eef2f7;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

th, td {
  padding: 14px 16px;
  text-align: left;
}

th {
  background: #f8fafc;
  font-size: 0.75rem;
  font-weight: 600;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid #eef2f7;
}

td {
  font-size: 0.85rem;
  border-bottom: 1px solid #f1f5f9;
  color: #334155;
}

tr:hover {
  background: #fff7f7;
}

/* ===== STATUS BADGE ===== */
.status-badge {
  padding: 5px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.status-pending {
  background: #fef3c7;
  color: #d97706;
}

.status-completed {
  background: #ecfdf5;
  color: #059669;
}

/* ===== ACTION BUTTONS ===== */
.action-buttons {
  display: flex;
  gap: 8px;
}

.action-buttons button {
  background: #f1f5f9;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.view-btn {
  color: #8B0000;
}

.view-btn:hover {
  background: #8B0000;
  color: white;
}

.delete-btn {
  color: #dc2626;
}

.delete-btn:hover {
  background: #dc2626;
  color: white;
}

/* ===== DETAILS PANEL ===== */
.details-panel {
  margin-top: 24px;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: all 0.4s ease;
  border: 1px solid #eef2f7;
}

.details-panel.open {
  max-height: 600px;
  opacity: 1;
  margin-top: 24px;
}

.details-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  background: #f8fafc;
  border-bottom: 1px solid #eef2f7;
}

.close-details {
  background: #f1f5f9;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.close-details:hover {
  background: #8B0000;
  color: white;
  transform: rotate(90deg);
}

.items-grid {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.product-item {
  background: #f8fafc;
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 15px;
  flex-wrap: wrap;
}

.product-item img {
  width: 50px;
  height: 50px;
  border-radius: 12px;
  object-fit: cover;
}

/* ===== NAV TABS ===== */
.nav-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.nav-tab {
  padding: 10px 24px;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 40px;
  cursor: pointer;
  font-weight: 500;
  font-size: 0.85rem;
  color: #475569;
  transition: all 0.2s;
}

.nav-tab:hover {
  border-color: #8B0000;
  color: #8B0000;
}

.nav-tab.active {
  background: #8B0000;
  color: white;
  border-color: #8B0000;
}

/* ===== BOTTOM NAV PAGES CONTENT ===== */
.bottom-page-content {
  animation: fadeUp 0.3s ease;
}

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: white;
  border-radius: 24px;
  padding: 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  animation: fadeUp 0.3s ease;
}

.modal i {
  font-size: 48px;
  color: #dc2626;
  margin-bottom: 16px;
}

.modal-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}

.modal-btn {
  padding: 10px 24px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.modal-btn.confirm {
  background: #dc2626;
  color: white;
}

.modal-btn.cancel {
  background: #f1f5f9;
  color: #475569;
}

.logout-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
}

.logout-modal.active {
  opacity: 1;
  visibility: visible;
}

.logout-modal-content {
  background: white;
  border-radius: 24px;
  padding: 32px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  animation: fadeUp 0.3s ease;
}

.logout-modal-content i {
  font-size: 52px;
  color: #8B0000;
  margin-bottom: 16px;
}

.logout-modal-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}

.logout-modal-btn {
  padding: 10px 28px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.logout-modal-btn.confirm {
  background: #8B0000;
  color: white;
}

.logout-modal-btn.cancel {
  background: #f1f5f9;
  color: #475569;
}

/* ===== TOAST ===== */
.toast-notification {
  position: fixed;
  bottom: 90px;
  right: 24px;
  background: #1e293b;
  color: white;
  padding: 14px 20px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  backdrop-filter: blur(10px);
  z-index: 9999;
  animation: slideIn 0.3s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

tbody tr {
  animation: fadeUp 0.3s ease;
}

/* ===== LOADING & EMPTY STATES ===== */
.loading-state, .empty-state {
  text-align: center;
  padding: 60px;
  color: #94a3b8;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
  
  .main {
    margin-left: 0;
    padding: 16px;
    padding-bottom: 80px;
  }
  
  .bottom-nav {
    left: 0;
    display: flex;
  }
  
  .stats-grid {
    grid-template-columns: 1fr;
  }
  
  .search-bar input {
    width: 140px;
  }
  
  .topbar {
    flex-direction: column;
    align-items: flex-start;
  }
  
  .filters {
    justify-content: center;
  }
  
  .toast-notification {
    bottom: 80px;
    right: 16px;
    left: 16px;
    bottom: 80px;
  }
}

/* Desktop: hide bottom nav by default */
@media (min-width: 769px) {
  .bottom-nav {
    display: none;
  }
}

/* ===== SKELETON LOADING ===== */
.skeleton {
  background: linear-gradient(90deg, #e2e8f0, #f1f5f9, #e2e8f0);
  background-size: 200% 100%;
  animation: loading 1.2s infinite;
  border-radius: 10px;
}

@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>

function toggleLoginPassword() {
  const pass = document.getElementById("loginPassword");
  const icon = document.querySelector("#loginScreen .toggle-password");
  if (pass.type === "password") {
    pass.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    pass.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

function showToast(message, icon = "fa-bell") {
  const toast = document.createElement('div');
  toast.className = 'toast-notification';
  toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function playSound() {
  const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
  audio.play().catch(e => console.log("Sound error:", e));
}

function showBrowserNotification(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, { 
      body: body, 
      icon: "https://i.ibb.co/Z17ftSn3/94655-B30-C7-E3-459-E-8-DBD-83-D9632-C55-CC.png",
      vibrate: [200, 100, 200]
    });
    playSound();
  }
}

async function handleLogin() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  const errorDiv = document.getElementById("loginError");
  
  errorDiv.innerText = "";
  
  if (email !== ALLOWED_EMAIL) {
    errorDiv.innerText = "❌ غير مسموح لك بدخول لوحة التحكم";
    return;
  }
  
  try {
    await auth.signInWithEmailAndPassword(email, password);
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("successScreen").style.cssText = "display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f1f5f9; flex-direction:column;";
    setTimeout(() => {
      document.getElementById("successScreen").style.display = "none";
      loadFullDashboard();
    }, 1200);
  } catch(error) {
    if (error.code === 'auth/user-not-found') {
      errorDiv.innerText = "❌ هذا البريد غير مسجل";
    } else if (error.code === 'auth/wrong-password') {
      errorDiv.innerText = "❌ كلمة المرور غير صحيحة";
    } else {
      errorDiv.innerText = "❌ خطأ: " + error.message;
    }
  }
}

async function setupPushNotifications() {
  try {
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
      console.log('✅ Notification permission granted');
      const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
      const token = await messaging.getToken({
        vapidKey: VAPID_KEY,
        serviceWorkerRegistration: registration
      });
      console.log('✅ FCM Token:', token);
      
      if (auth.currentUser) {
        await db.collection('pushTokens').doc(auth.currentUser.uid).set({
          token: token,
          userId: auth.currentUser.uid,
          email: auth.currentUser.email,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      
      messaging.onMessage((payload) => {
        const title = payload.notification?.title || '🆕 طلب جديد!';
        const body = payload.notification?.body || 'لديك طلب جديد في المتجر';
        showBrowserNotification(title, body);
        showToast(body, 'fa-shopping-cart');
      });
    }
  } catch (error) {
    console.error('Push notifications error:', error);
  }
}

function monitorNewOrders() {
  db.collection('orders').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
    snapshot.docChanges().forEach((change) => {
      if (change.type === 'added') {
        const newOrder = change.doc.data();
        const orderId = change.doc.id;
        
        if (lastOrderId !== orderId) {
          lastOrderId = orderId;
          const customerName = newOrder.customerName || newOrder.customer || "عميل جديد";
          const total = newOrder.total || 0;
          
          playSound();
          showToast(`🆕 طلب جديد من ${customerName} - ${total} MAD`, 'fa-shopping-cart');
          
          if (Notification.permission === "granted") {
            new Notification('🆕 طلب جديد!', {
              body: `من: ${customerName} | المجموع: ${total} MAD`,
              icon: "https://i.ibb.co/Z17ftSn3/94655-B30-C7-E3-459-E-8-DBD-83-D9632-C55-CC.png"
            });
          }
        }
      }
    });
  });
}

function updateStatisticsPage(orders) {
  const totalOrders = orders.length;
  const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
  const avgOrder = totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0;
  const completedOrders = orders.filter(o => o.status === 'completed').length;
  const pendingOrders = orders.filter(o => o.status === 'pending').length;
  const completionRate = totalOrders > 0 ? Math.round((completedOrders / totalOrders) * 100) : 0;
  
  const completedPercent = totalOrders > 0 ? Math.round((completedOrders / totalOrders) * 100) : 0;
  const pendingPercent = totalOrders > 0 ? Math.round((pendingOrders / totalOrders) * 100) : 0;
  
  const totalOrdersEl = document.getElementById('statTotalOrders');
  const totalRevenueEl = document.getElementById('statTotalRevenue');
  const avgOrderEl = document.getElementById('statAvgOrder');
  const completionRateEl = document.getElementById('statCompletionRate');
  const completedCountEl = document.getElementById('statCompletedCount');
  const pendingCountEl = document.getElementById('statPendingCount');
  const completedPercentEl = document.getElementById('statCompletedPercent');
  const pendingPercentEl = document.getElementById('statPendingPercent');
  
  if (totalOrdersEl) totalOrdersEl.innerText = totalOrders;
  if (totalRevenueEl) totalRevenueEl.innerText = totalRevenue.toLocaleString() + ' MAD';
  if (avgOrderEl) avgOrderEl.innerText = avgOrder.toLocaleString() + ' MAD';
  if (completionRateEl) completionRateEl.innerText = completionRate + '%';
  if (completedCountEl) completedCountEl.innerText = completedOrders;
  if (pendingCountEl) pendingCountEl.innerText = pendingOrders;
  if (completedPercentEl) completedPercentEl.innerText = completedPercent + '%';
  if (pendingPercentEl) pendingPercentEl.innerText = pendingPercent + '%';
}

function initDashboard(logoutModal) {
  let allOrders = [];
  let currentPage = 'orders';
  let currentSearch = '';
  let currentFilter = 'all';
  let selectedDate = null;
  let orderToDelete = null;
  
  // Store orders globally for statistics page
  window.allOrdersData = allOrders;
  window.refreshOrdersData = () => {
    if (currentBottomPage === 'statistic' && allOrders.length > 0) {
      updateStatisticsPage(allOrders);
    }
  };
  
  // Logout logic
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', () => logoutModal.classList.add('active'));
  }
  
  document.getElementById('cancelLogoutBtn')?.addEventListener('click', () => logoutModal.classList.remove('active'));
  document.getElementById('confirmLogoutBtn')?.addEventListener('click', async () => {
    logoutModal.classList.remove('active');
    await auth.signOut();
    window.location.reload();
  });
  
  logoutModal.addEventListener('click', (e) => {
    if (e.target === logoutModal) logoutModal.classList.remove('active');
  });
  
  // Flatpickr
  flatpickr("#datePicker", {
    dateFormat: "Y-m-d",
    onChange: (dates, dateStr) => {
      if (dateStr) {
        selectedDate = dateStr;
        currentFilter = 'custom';
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        renderCurrentPage();
      }
    }
  });
  
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      selectedDate = null;
      document.getElementById('datePicker').value = '';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCurrentPage();
    });
  });
  
  // Navigation
  document.querySelectorAll('.nav-item').forEach(nav => {
    nav.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      nav.classList.add('active');
      currentPage = nav.dataset.page;
      currentSearch = '';
      document.getElementById('searchInput').value = '';
      updatePageTitle();
      renderCurrentPage();
    });
  });
  
  function updatePageTitle() {
    const titles = {
      orders: 'Orders Dashboard',
      customers: 'Customers Management',
      stores: 'Stores Overview',
      analytics: 'Analytics & Insights'
    };
    document.getElementById('pageTitle').innerText = titles[currentPage] || 'Dashboard';
  }
  
  function filterByDate(order) {
    const orderDate = new Date(order.date);
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
    const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);
    const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth() - 1);
    
    switch(currentFilter) {
      case 'today': return orderDate.toDateString() === today.toDateString();
      case 'yesterday': return orderDate.toDateString() === yesterday.toDateString();
      case 'week': return orderDate >= weekAgo;
      case 'month': return orderDate >= monthAgo;
      case 'custom': return selectedDate ? orderDate.toISOString().split('T')[0] === selectedDate : true;
      default: return true;
    }
  }
  
  async function loadOrders() {
    const tbody = document.getElementById('tableBody');
    if (tbody) tbody.innerHTML = '<tr><td colspan="10" class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading...<\/td><\/tr>';
    try {
      const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
      allOrders = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        allOrders.push({
          id: doc.id,
          orderId: data.orderId || doc.id.slice(0,8),
          customer: data.customerName || data.customer || "Guest",
          phone: data.phone || "N/A",
          total: data.total || 0,
          date: data.orderDate || (data.createdAt?.toDate?.()?.toLocaleDateString()) || new Date().toLocaleDateString(),
          status: data.orderStatus || data.status || "pending",
          items: data.items || []
        });
      });
      window.allOrdersData = allOrders;
      renderCurrentPage();
      
      // Update statistics page if active
      if (currentBottomPage === 'statistic') {
        updateStatisticsPage(allOrders);
      }
    } catch(e) {
      if (tbody) tbody.innerHTML = `<tr><td colspan="10" class="empty-state">Error: ${e.message}<\/td><\/tr>`;
    }
  }
  
  async function deleteOrder(id) {
    await db.collection('orders').doc(id).delete();
    await loadOrders();
    const detailsPanel = document.getElementById('detailsPanel');
    if (detailsPanel) detailsPanel.classList.remove('open');
  }
  
  function renderCurrentPage() {
    if (currentPage === 'orders') renderOrders();
    else if (currentPage === 'customers') renderCustomers();
    else if (currentPage === 'stores') renderStores();
    else if (currentPage === 'analytics') renderAnalytics();
  }
  
  function renderOrders() {
    let filtered = allOrders.filter(o => filterByDate(o));
    if (currentSearch) {
      const s = currentSearch.toLowerCase();
      filtered = filtered.filter(o => o.orderId.toLowerCase().includes(s) || o.customer.toLowerCase().includes(s) || o.phone.includes(s));
    }
    
    const rev = filtered.reduce((s,o) => s + o.total, 0);
    const pending = filtered.filter(o => o.status === 'pending').length;
    const completed = filtered.filter(o => o.status === 'completed').length;
    
    const statsContainer = document.getElementById('statsContainer');
    if (statsContainer) {
      statsContainer.innerHTML = `
        <div class="stat-card"><div class="stat-info"><h4>Total Orders</h4><div class="stat-number">${filtered.length}</div></div><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Revenue</h4><div class="stat-number">${rev.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Pending</h4><div class="stat-number">${pending}</div></div><div class="stat-icon"><i class="fas fa-clock"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Completed</h4><div class="stat-number">${completed}</div></div><div class="stat-icon"><i class="fas fa-check-circle"></i></div></div>
      `;
    }
    
    const tableHeader = document.getElementById('tableHeader');
    if (tableHeader) tableHeader.innerHTML = `<tr><th>ORDER ID</th><th>CUSTOMER</th><th>PHONE</th><th>TOTAL</th><th>DATE</th><th>STATUS</th><th>ITEMS</th><th>ACTIONS</th></td>`;
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No orders found</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(o => `
      <tr>
        <td><strong>${o.orderId}</strong></td>
        <td><i class="fas fa-user"></i> ${o.customer}</td>
        <td><i class="fas fa-phone"></i> ${o.phone}</td>
        <td>${o.total.toLocaleString()} MAD</td>
        <td>${o.date}</td>
        <td><span class="status-badge status-${o.status}"><i class="fas ${o.status === 'pending' ? 'fa-hourglass-half' : 'fa-check'}"></i> ${o.status}</span></td>
        <td>${o.items?.length || 0} items</td>
        <td class="action-buttons">
          <button class="view-btn" onclick="window.dashboardShowDetails('${o.id}')"><i class="fas fa-eye"></i></button>
          <button class="delete-btn" onclick="window.dashboardConfirmDelete('${o.id}')"><i class="fas fa-trash-alt"></i></button>
        </td>
      </td>
    `).join('');
  }
  
  function renderCustomers() {
    let filtered = allOrders.filter(o => filterByDate(o));
    const map = new Map();
    filtered.forEach(o => {
      if (!map.has(o.phone)) map.set(o.phone, { name: o.customer, phone: o.phone, orders: 0, total: 0 });
      const c = map.get(o.phone);
      c.orders++;
      c.total += o.total;
    });
    let customers = Array.from(map.values());
    if (currentSearch) customers = customers.filter(c => c.name.toLowerCase().includes(currentSearch.toLowerCase()) || c.phone.includes(currentSearch));
    const totalSpent = customers.reduce((s,c) => s + c.total, 0);
    
    const statsContainer = document.getElementById('statsContainer');
    if (statsContainer) {
      statsContainer.innerHTML = `
        <div class="stat-card"><div class="stat-info"><h4>Total Customers</h4><div class="stat-number">${customers.length}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Total Spent</h4><div class="stat-number">${totalSpent.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-coins"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Avg per Customer</h4><div class="stat-number">${Math.round(totalSpent/customers.length) || 0} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Total Orders</h4><div class="stat-number">${filtered.length}</div></div><div class="stat-icon"><i class="fas fa-shopping-bag"></i></div></div>
      `;
    }
    
    const tableHeader = document.getElementById('tableHeader');
    if (tableHeader) tableHeader.innerHTML = `<tr><th>CUSTOMER</th><th>PHONE</th><th>ORDERS</th><th>TOTAL SPENT</th></tr>`;
    const tbody = document.getElementById('tableBody');
    if (tbody) {
      tbody.innerHTML = customers.map(c => `
        <tr><td><i class="fas fa-user-circle"></i> ${c.name}</td><td>${c.phone}</td><td>${c.orders}</td><td>${c.total.toLocaleString()} MAD</td></tr>
      `).join('');
    }
  }
  
  function renderStores() {
    let filtered = allOrders.filter(o => filterByDate(o));
    const store = { name: "Fleuriste Marrakech", orders: filtered.length, revenue: filtered.reduce((s,o) => s + o.total, 0) };
    
    const statsContainer = document.getElementById('statsContainer');
    if (statsContainer) {
      statsContainer.innerHTML = `
        <div class="stat-card"><div class="stat-info"><h4>Total Stores</h4><div class="stat-number">1</div></div><div class="stat-icon"><i class="fas fa-store"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Total Revenue</h4><div class="stat-number">${store.revenue.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-bar"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Total Orders</h4><div class="stat-number">${store.orders}</div></div><div class="stat-icon"><i class="fas fa-box"></i></div></div>
      `;
    }
    
    const tableHeader = document.getElementById('tableHeader');
    if (tableHeader) tableHeader.innerHTML = `</table><th>STORE NAME</th><th>TOTAL ORDERS</th><th>TOTAL REVENUE</th></tr>`;
    const tbody = document.getElementById('tableBody');
    if (tbody) {
      tbody.innerHTML = `<tr><td><i class="fas fa-store"></i> ${store.name}</td><td>${store.orders}</td><td>${store.revenue.toLocaleString()} MAD</td></tr>`;
    }
  }
  
  function renderAnalytics() {
    let filtered = allOrders.filter(o => filterByDate(o));
    const rev = filtered.reduce((s,o) => s + o.total, 0);
    const avg = filtered.length ? Math.round(rev / filtered.length) : 0;
    const completed = filtered.filter(o => o.status === 'completed').length;
    const rate = filtered.length ? Math.round((completed / filtered.length) * 100) : 0;
    
    const statsContainer = document.getElementById('statsContainer');
    if (statsContainer) {
      statsContainer.innerHTML = `
        <div class="stat-card"><div class="stat-info"><h4>Total Revenue</h4><div class="stat-number">${rev.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Average Order</h4><div class="stat-number">${avg.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-simple"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Completion Rate</h4><div class="stat-number">${rate}%</div></div><div class="stat-icon"><i class="fas fa-percent"></i></div></div>
        <div class="stat-card"><div class="stat-info"><h4>Total Orders</h4><div class="stat-number">${filtered.length}</div></div><div class="stat-icon"><i class="fas fa-chart-pie"></i></div></div>
      `;
    }
    
    const tableHeader = document.getElementById('tableHeader');
    if (tableHeader) tableHeader.innerHTML = `<tr><th>METRIC</th><th>VALUE</th><th>INSIGHT</th></tr>`;
    const tbody = document.getElementById('tableBody');
    if (tbody) {
      tbody.innerHTML = `
        <tr><td>Total Revenue</td><td><strong>${rev.toLocaleString()} MAD</strong></td><td>Sales in period</td></tr>
        <tr><td>Total Orders</td><td><strong>${filtered.length}</strong></td><td>Orders placed</td></tr>
        <tr><td>Completed Orders</td><td><strong>${completed}</strong></td><td>Delivered</td></tr>
        <tr><td>Average Order</td><td><strong>${avg.toLocaleString()} MAD</strong></td><td>Per transaction</td></tr>
      `;
    }
  }
  
  window.dashboardShowDetails = function(id) {
    const order = allOrders.find(o => o.id === id);
    if (!order) return;
    const detailsTitle = document.getElementById('detailsTitle');
    if (detailsTitle) detailsTitle.innerHTML = `Order ${order.orderId} - ${order.customer}`;
    const container = document.getElementById('itemsContainer');
    if (!container) return;
    if (!order.items?.length) container.innerHTML = '<div class="empty-state">No items</div>';
    else container.innerHTML = order.items.map(item => `
      <div class="product-item">
        <img src="${item.img || 'https://picsum.photos/id/104/55/55'}" onerror="this.src='https://picsum.photos/id/145/55/55'">
        <div style="flex:1"><strong>${item.name}</strong></div>
        <div>${item.price} MAD</div>
        <div>Qty: ${item.quantity || 1}</div>
      </div>
    `).join('');
    const detailsPanel = document.getElementById('detailsPanel');
    if (detailsPanel) detailsPanel.classList.add('open');
  };
  
  window.dashboardConfirmDelete = function(id) {
    orderToDelete = id;
    const deleteModal = document.getElementById('deleteModal');
    if (deleteModal) deleteModal.classList.add('active');
  };
  
  function closeModal() {
    const deleteModal = document.getElementById('deleteModal');
    if (deleteModal) deleteModal.classList.remove('active');
    orderToDelete = null;
  }
  
  const closeDetailsBtn = document.getElementById('closeDetailsBtn');
  if (closeDetailsBtn) closeDetailsBtn.onclick = () => {
    const detailsPanel = document.getElementById('detailsPanel');
    if (detailsPanel) detailsPanel.classList.remove('open');
  };
  
  const searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.addEventListener('input', (e) => { currentSearch = e.target.value; renderCurrentPage(); });
  
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) refreshBtn.addEventListener('click', loadOrders);
  
  const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
  if (cancelDeleteBtn) cancelDeleteBtn.addEventListener('click', closeModal);
  
  const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
  if (confirmDeleteBtn) confirmDeleteBtn.addEventListener('click', async () => { if (orderToDelete) { await deleteOrder(orderToDelete); closeModal(); } });
  
  const deleteModal = document.getElementById('deleteModal');
  if (deleteModal) deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeModal(); });
  
  db.collection('orders').onSnapshot(() => loadOrders());
  loadOrders();
  updatePageTitle();
  
  // Check notification status for settings page
  if (Notification.permission === 'granted') {
    const notifStatus = document.getElementById('notifStatus');
    if (notifStatus) notifStatus.innerText = 'Enabled';
  } else {
    const notifStatus = document.getElementById('notifStatus');
    if (notifStatus) notifStatus.innerText = 'Disabled';
  }
  
  const toggleNotifBtn = document.getElementById('toggleNotifBtn');
  if (toggleNotifBtn) {
    toggleNotifBtn.addEventListener('click', async () => {
      if (Notification.permission === 'granted') {
        showToast('Notifications are already enabled', 'fa-info-circle');
      } else {
        const permission = await Notification.requestPermission();
        const notifStatus = document.getElementById('notifStatus');
        if (permission === 'granted') {
          if (notifStatus) notifStatus.innerText = 'Enabled';
          showToast('Notifications enabled successfully', 'fa-check-circle');
        } else {
          if (notifStatus) notifStatus.innerText = 'Disabled';
          showToast('Please enable notifications in browser settings', 'fa-exclamation-triangle');
        }
      }
    });
  }
}

// Auth state handler
auth.onAuthStateChanged(async (user) => {
  if (user && user.email === ALLOWED_EMAIL) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("successScreen").style.cssText = "display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f1f5f9; flex-direction:column;";
    setTimeout(() => {
      document.getElementById("successScreen").style.display = "none";
      loadFullDashboard();
    }, 1200);
  } else if (user && user.email !== ALLOWED_EMAIL) {
    await auth.signOut();
    document.getElementById("loginError").innerText = "❌ هذا الحساب غير مصرح له بدخول لوحة التحكم";
  }
});
</script>
</body>
</html>
